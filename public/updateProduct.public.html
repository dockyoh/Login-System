<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style/addProduct.css" />
    <title>Update Product</title>
  </head>

  <body>
    <header>
      <h1>UPDATE PRODUCT</h1>
      <nav class="nav-container">
        <ul>
          <li><a href="./dashboard.public.html">Dashboard</a></li>
          <li><a href="./addProduct.public.php">Add Product</a></li>
        </ul>
      </nav>
      <div class="logout-container">
        <p class="loged-user">drugUser</p>
        <button class="logout-button">Logout</button>
      </div>
    </header>
    <!-- TEMPLATE CONTAINER -->
    <main class="template-container">
      <!-- FORM TEMPLATE -->
      <template class="update-template">
        <form action="" method="post">
          <input type="hidden" name="productId" value="" />
          <div class="input-wrap">
            <label for="input-name">Name</label>
            <input type="text" name="productName" id="input-name" value="" />
          </div>

          <div class="input-wrap">
            <label for="input-price">Price</label>
            <input
              type="number"
              step="any"
              name="productPrice"
              id="input-price"
              value=""
            />
          </div>

          <div class="input-wrap">
            <label for="input-quantity">Quantity</label>
            <input
              type="number"
              name="stockQuantity"
              id="input-quantity"
              value=""
            />
          </div>

          <div class="active-wrap">
            <label for="is-active">Is Active?</label>
            <select name="isActive" id="is-active">
              <option value=""></option>

              <option value=""></option>
            </select>
          </div>

          <button type="submit" class="update-button" name="updateButton">
            Save
          </button>
        </form>
      </template>
      <div class="errors-container">
        <p></p>
      </div>
    </main>
    <footer></footer>
    <script type="module" src="../scripts/update.js"></script>
  </body>
</html>
